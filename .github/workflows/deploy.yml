name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_IMAGE: knowledge-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push optimized image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          # Registry-backed build cache keeps dependency layers stable across builds,
          # which prevents large re-downloads on the EC2 host when only app code changes.
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:buildcache,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            # Backup .env before pull
            cp .env .env.backup 2>/dev/null || true
            git stash
            git pull origin main
            # Restore .env if backup exists
            cp .env.backup .env 2>/dev/null || true
            rm -f .env.backup

            # Ensure Compose substitution variables exist in this non-interactive SSH session.
            # Add these as GitHub Secrets: CADDY_EMAIL, ADMIN_DOMAIN, USER_DOMAIN.
            export CADDY_EMAIL='${{ secrets.CADDY_EMAIL }}'
            export ADMIN_DOMAIN='${{ secrets.ADMIN_DOMAIN }}'
            export USER_DOMAIN='${{ secrets.USER_DOMAIN }}'

            export DOCKER_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            docker compose -f docker-compose.prod.yml -f docker-compose.https.yml pull
            docker compose -f docker-compose.prod.yml -f docker-compose.https.yml up -d

